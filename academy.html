<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Structure Academy — STRUCTURA Deal School</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:#080c10; --bg2:#0d1318; --bg3:#131b22; --bg4:#192028;
  --border:#1e2d3d; --border2:#253545;
  --accent:#00e5ff; --accent2:#7b61ff; --green:#00e676;
  --red:#ff3d71; --amber:#ffd740; --teal:#64ffda;
  --text:#e0eaf4; --text2:#7a99b8; --text3:#4a6680;
  --mono:'Space Mono',monospace; --sans:'Syne',sans-serif; --body:'Inter',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--body);font-size:13px;line-height:1.5;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:999}
::-webkit-scrollbar{width:4px;height:4px} ::-webkit-scrollbar-track{background:var(--bg)} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── NAV ── */
.top-nav{position:sticky;top:0;z-index:100;background:rgba(8,12,16,0.97);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);display:flex;align-items:center;padding:0 20px;height:52px;gap:16px;}
.nav-logo{font-family:var(--sans);font-size:15px;font-weight:800;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:8px;}
.nav-logo-icon{width:24px;height:24px;background:var(--accent2);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);box-shadow:0 0 12px rgba(123,97,255,0.5);}
.stage-tabs{display:flex;gap:0;flex:1;overflow-x:auto;scrollbar-width:none;}
.stage-tabs::-webkit-scrollbar{display:none}
.stage-tab{padding:0 14px;height:52px;display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9px;letter-spacing:1px;color:var(--text3);cursor:pointer;border-right:1px solid var(--border);border-bottom:2px solid transparent;transition:all 0.2s;white-space:nowrap;text-transform:uppercase;flex-shrink:0;user-select:none;}
.stage-tab:hover{color:var(--text2);background:rgba(255,255,255,0.02)}
.stage-tab.active{color:var(--accent2);border-bottom-color:var(--accent2);background:rgba(123,97,255,0.05)}
.back-btn{font-family:var(--mono);font-size:9px;color:var(--text3);text-decoration:none;padding:6px 12px;border:1px solid var(--border);border-radius:4px;white-space:nowrap;transition:all 0.2s;}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── LAYOUT ── */
.stage-layout{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 52px);}
.stage-sidebar{border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;}
.stage-main{overflow-y:auto;}
.stage-panel{display:none;height:100%;} .stage-panel.active{display:flex;flex-direction:column;}

/* ── SIDEBAR ITEMS ── */
.sb-section{padding:12px 12px 6px;font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid var(--border);}
.sb-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid rgba(30,45,61,0.4);transition:all 0.15s;display:flex;align-items:center;gap:8px;}
.sb-item:hover{background:rgba(255,255,255,0.02)} .sb-item.active{background:rgba(123,97,255,0.08);border-left:2px solid var(--accent2);}
.sb-icon{font-size:16px;flex-shrink:0} .sb-label{font-size:11px;color:var(--text);font-weight:500} .sb-sub{font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:1px;}

/* ── CARDS ── */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:14px;}
.card-header{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg4);}
.card-title{font-family:var(--mono);font-size:10px;letter-spacing:1px;color:var(--text2);text-transform:uppercase;}
.card-body{padding:14px 16px;}
.section-hdr{font-family:var(--sans);font-size:18px;font-weight:700;color:var(--text);margin-bottom:6px;}
.section-sub{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:16px;}

/* ── TABLE ── */
.tbl-wrap{overflow:auto;max-height:420px;}
table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:10px;}
thead th{position:sticky;top:0;background:var(--bg4);padding:7px 10px;text-align:right;color:var(--text3);font-size:8px;letter-spacing:1px;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;z-index:2;}
thead th:first-child,thead th:nth-child(2){text-align:left}
thead th:hover{color:var(--accent)}
tbody tr{border-bottom:1px solid rgba(30,45,61,0.4);transition:background 0.1s;}
tbody tr:hover{background:rgba(0,229,255,0.03)}
tbody td{padding:6px 10px;text-align:right;white-space:nowrap}
tbody td:first-child,tbody td:nth-child(2){text-align:left}
.eligible-row{} .cut-row{opacity:0.45}
.td-green{color:var(--green)} .td-red{color:var(--red)} .td-amber{color:var(--amber)} .td-accent{color:var(--accent)}
.cut-badge{display:inline-block;font-size:8px;padding:1px 6px;border-radius:2px;background:rgba(255,61,113,0.15);color:var(--red);white-space:nowrap;}
.ok-badge{display:inline-block;font-size:8px;padding:1px 6px;border-radius:2px;background:rgba(0,230,118,0.12);color:var(--green);}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg4);}
.filter-chip{padding:4px 12px;border-radius:20px;border:1px solid var(--border2);font-family:var(--mono);font-size:9px;color:var(--text3);cursor:pointer;transition:all 0.2s;background:transparent;}
.filter-chip.on{background:var(--accent2);color:#fff;border-color:transparent;}
.filter-chip:hover{border-color:var(--accent2);color:var(--accent2);}
.search-mini{background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:5px 10px;color:var(--text);font-family:var(--mono);font-size:10px;outline:none;width:160px;}
.search-mini:focus{border-color:var(--accent)}
.filter-select{background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:5px 8px;color:var(--text);font-family:var(--mono);font-size:10px;outline:none;}

/* ── STATS BAR ── */
.stats-bar{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--bg2);}
.stat-cell{padding:8px 16px;border-right:1px solid var(--border);font-family:var(--mono);}
.stat-label{font-size:8px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;}
.stat-val{font-size:14px;font-weight:700;margin-top:2px;}

/* ── ELIGIBILITY SLIDERS ── */
.elig-controls{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:14px 16px;}
.elig-control{background:var(--bg4);border:1px solid var(--border);border-radius:6px;padding:10px 12px;}
.ec-label{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.ec-val{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--accent);margin-bottom:6px;}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;background:var(--border2);border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent2);cursor:pointer;box-shadow:0 0 6px rgba(123,97,255,0.6);}

/* ── CAPITAL STACK BUILDER ── */
.stack-builder{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.stack-visual{display:flex;flex-direction:column;gap:2px;}
.stack-bar{height:0;min-height:20px;border-radius:4px;display:flex;align-items:center;justify-content:space-between;padding:0 10px;transition:height 0.5s cubic-bezier(.34,1.56,.64,1),background 0.3s;cursor:pointer;position:relative;}
.stack-bar:hover{filter:brightness(1.2)}

/* ── CUSIP DB ── */
.cusip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;padding:14px 16px;}
.cusip-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;cursor:pointer;transition:all 0.2s;}
.cusip-card:hover{border-color:var(--accent);box-shadow:0 0 16px rgba(0,229,255,0.1);transform:translateY(-1px);}
.cusip-card.selected{border-color:var(--accent2);background:rgba(123,97,255,0.08);}

/* ── WATERFALL FLOW ── */
.wf-flow{display:flex;flex-direction:column;gap:0;}
.wf-step{display:flex;align-items:stretch;gap:0;animation:fadeUp 0.3s ease forwards;opacity:0;}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)} from{opacity:0;transform:translateY(6px)}}
.wf-pipe{width:4px;flex-shrink:0;border-radius:2px;}
.wf-content{flex:1;padding:10px 16px;border-bottom:1px solid var(--border);}
.wf-step-num{font-family:var(--mono);font-size:8px;font-weight:700;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin:10px 0 0 8px;}

/* ── NARRATIVE ── */
.narrative{background:rgba(255,255,255,0.02);border-left:3px solid var(--accent2);border-radius:0 6px 6px 0;padding:14px 18px;margin-bottom:16px;font-size:13px;color:var(--text2);line-height:1.8;}
.callout{border-radius:8px;padding:14px 16px;margin:12px 0;font-size:12px;line-height:1.7;}
.callout-green{background:rgba(0,230,118,0.05);border:1px solid rgba(0,230,118,0.2);}
.callout-red{background:rgba(255,61,113,0.05);border:1px solid rgba(255,61,113,0.2);}
.callout-amber{background:rgba(255,215,64,0.05);border:1px solid rgba(255,215,64,0.2);}
.callout-blue{background:rgba(0,229,255,0.05);border:1px solid rgba(0,229,255,0.15);}
.callout-tag{font-family:var(--mono);font-size:8px;letter-spacing:1px;font-weight:700;margin-bottom:6px;}

/* ── BUTTONS ── */
.btn{padding:7px 16px;border-radius:5px;border:none;cursor:pointer;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:all 0.2s;}
.btn-primary{background:var(--accent2);color:#fff;box-shadow:0 0 16px rgba(123,97,255,0.3);}
.btn-primary:hover{box-shadow:0 0 24px rgba(123,97,255,0.5);transform:translateY(-1px);}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-ghost:hover{border-color:var(--accent2);color:var(--accent2);}
.btn-sm{padding:4px 10px;font-size:9px;}
.btn-cyan{background:var(--accent);color:#000;}

/* ── KPI ── */
.kpi-strip{display:flex;gap:0;border-bottom:1px solid var(--border);}
.kpi{padding:10px 18px;border-right:1px solid var(--border);font-family:var(--mono);}
.kpi-l{font-size:8px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;}
.kpi-v{font-size:16px;font-weight:700;margin-top:2px;}

/* ── TOOLTIP ── */
.has-tip{position:relative;cursor:help;border-bottom:1px dotted var(--text3);}
.has-tip::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:0;background:var(--bg2);border:1px solid var(--border2);border-radius:4px;padding:6px 10px;font-size:10px;color:var(--text2);white-space:nowrap;z-index:1000;display:none;font-family:var(--body);font-weight:400;max-width:280px;white-space:normal;line-height:1.5;}
.has-tip:hover::after{display:block;}

/* ── CHART ── */
.chart-wrap{position:relative;height:200px;}

/* ── PROGRESS ── */
.progress-track{display:flex;gap:0;height:4px;border-radius:2px;overflow:hidden;background:var(--border);margin-bottom:12px;}
.progress-fill{height:100%;border-radius:2px;transition:width 0.6s ease;}

/* ── ANIMATIONS ── */
@keyframes countUp{from{opacity:0}to{opacity:1}}
.count-up{animation:countUp 0.8s ease forwards;}

/* ── BOTTOM NAV ── */
.bottom-bar{position:sticky;bottom:0;background:rgba(8,12,16,0.97);border-top:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(10px);}
.stage-progress{font-family:var(--mono);font-size:9px;color:var(--text3);}
</style>
</head>

function init() {
  buildNav();
  buildSidebar();
  goToStage(0);
}

function goBack() {
  if(window.opener) window.opener.focus();
  // If opened as standalone, go back
  history.back();
}

function buildNav() {
  document.getElementById('stageTabs').innerHTML = STAGES.map((s,i)=>`
    <div class="stage-tab ${i===0?'active':''}" id="stab${i}" onclick="goToStage(${i})">
      ${s.icon} ${s.label}
    </div>
  `).join('');
}

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = `<div class="sb-section">Deal Stages</div>` +
    STAGES.slice(0,10).map((s,i)=>`
      <div class="sb-item ${i===0?'active':''}" id="sbItem${i}" onclick="goToStage(${i})">
        <div class="sb-icon">${s.icon}</div>
        <div>
          <div class="sb-label">${s.title}</div>
          <div class="sb-sub">${s.label}</div>
        </div>
      </div>
    `).join('') +
    `<div class="sb-section" style="margin-top:8px;">Data</div>` +
    `<div class="sb-item ${10===0?'active':''}" id="sbItem10" onclick="goToStage(10)">
      <div class="sb-icon">🗄️</div>
      <div><div class="sb-label">CUSIP Library</div><div class="sb-sub">${CUSIP_DB.length} bonds tracked</div></div>
    </div>`;
}

function goToStage(i) {
  APP.stage = i;
  // Update nav
  STAGES.forEach((_,j)=>{
    document.getElementById('stab'+j)?.classList.toggle('active',j===i);
    document.getElementById('sbItem'+j)?.classList.toggle('active',j===i);
  });
  // Render
  const renders = [renderStage0,renderStage1,renderStage2,renderStage3,renderStage4,renderStage5,renderStage6,renderStage7,renderStage8,renderStage9,renderStage10];
  if(renders[i]) renders[i]();
}

// HELPERS
// ════════════════════════════════════════════════════
const fmt$ = n => '$'+n.toLocaleString();
const fmtK = n => n>=1e6?'$'+(n/1e6).toFixed(2)+'M':'$'+(n/1e3).toFixed(0)+'K';
const fmtPct = n => n.toFixed(1)+'%';
const avg = (arr,fn) => arr.reduce((s,x)=>s+(fn?fn(x):x),0)/arr.length;
const sum = (arr,fn) => arr.reduce((s,x)=>s+(fn?fn(x):x),0);

function poolStats(loans) {
  if(!loans.length) return {};
  return {
    count: loans.length,
    bal: sum(loans,x=>x.balance),
    avgBal: avg(loans,x=>x.balance),
    avgFico: avg(loans,x=>x.fico),
    avgLtv: avg(loans,x=>x.ltv),
    avgDti: avg(loans,x=>x.dti),
    avgRate: avg(loans,x=>x.rate),
    states: [...new Set(loans.map(x=>x.state))].length,
  };
}

function applyEligibility(loans, criteria) {
  return loans.map(l => {
    const dqRank = {'0x30':0,'1x30':1,'2x30':2,'1x60':3,'2x60':4,'1x90':5};
    const maxDQRank = dqRank[criteria.maxDQ]||1;
    const checks = {
      fico: l.fico >= criteria.ficoMin,
      ltv:  l.ltv <= criteria.ltvMax,
      dti:  l.dti <= criteria.dtiMax,
      dq:   (dqRank[l.dq_hist]||0) <= maxDQRank,
      size: l.balance <= criteria.loanMax,
      age:  l.age_months >= criteria.ageMin && l.age_months <= criteria.ageMax,
    };
    const eligible = Object.values(checks).every(Boolean);
    const cutReason = eligible ? '' : Object.entries(checks).find(([,v])=>!v)?.[0]||'';
    return {...l, eligible, cut_reason: cutReason, checks};
  });
}

function getFilteredLoans(loans) {
  const f = APP.poolFilters;
  return loans.filter(l => {
    if(f.state !== 'ALL' && l.state !== f.state) return false;
    if(f.purpose !== 'ALL' && l.purpose !== f.purpose) return false;
    if(f.creditTier !== 'ALL' && l.credit_tier !== f.creditTier) return false;
    if(f.search && !l.id.toLowerCase().includes(f.search.toLowerCase()) && !l.state.toLowerCase().includes(f.search.toLowerCase())) return false;
    return true;
  });
}

function resetFilters0() {
  APP.poolFilters = {showCut:true, state:'ALL', purpose:'ALL', propType:'ALL', creditTier:'ALL', search:''};
  renderStage0();
}

let poolSortCol = null, poolSortDir = 1;
function sortPool(col, idx) {
  if(poolSortCol===col) poolSortDir*=-1; else {poolSortCol=col;poolSortDir=1;}
  const loans = getFilteredLoans(POOL_RAW);
  loans.sort((a,b)=>{ const va=a[col], vb=b[col]; return typeof va==='number'?(va-vb)*poolSortDir:String(va).localeCompare(String(vb))*poolSortDir; });
  renderPoolTableDirect(loans);
}

  A2:{rating:'AAA',color:'#64ffda',tipColor:'#000',coupon:5.75,oas:48,desc:'Second senior class. Slightly longer WAL than A1.'},
  M1:{rating:'AA',color:'#00e5ff',tipColor:'#000',coupon:6.25,oas:115,desc:'First mezzanine class. Subordinate to seniors. OC/IC trigger exposure.'},
  M2:{rating:'A',color:'#7b61ff',tipColor:'#fff',coupon:6.75,oas:185,desc:'Second mezzanine. Higher spread, trigger-sensitive.'},
  B1:{rating:'BBB',color:'#ffd740',tipColor:'#000',coupon:7.75,oas:310,desc:'Sub-investment grade. First rated class to take losses after OC depletes.'},

  const econ = document.getElementById('dealEcon');
  if(econ) {
    const notePct = 100-sl.OC;
    const noteBal = poolBal*notePct/100;

           ['Pool WAC (assumed)','6.75%','var(--text)'],['Blended Cost',blended.toFixed(2)+'%','var(--red)'],
           ['Excess Spread',exSpread.toFixed(2)+'%',exSpread>0?'var(--green)':'var(--red)'],

          ].map(([l,v,c])=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);"><span style="color:var(--text3);">${l}</span><span style="color:${c};font-weight:700;">${v}</span></div>`).join('')}
      </div>

  }
}

function calcBlendedCost() {
  const sl = APP.stackSliders;
  const total = Object.entries(sl).filter(([id])=>id!=='OC').reduce((a,[,v])=>a+v,0);
  return Object.entries(sl).filter(([id])=>id!=='OC').reduce((a,[id,pct])=>a+(pct/total)*TRANCHE_META[id].coupon,0);
}

function runRatingStress() {
  const eligible = applyEligibility(POOL_RAW, APP.eligCriteria).filter(x=>x.eligible);
  const poolBal = sum(eligible,x=>x.balance);
  const avgFico = avg(eligible,x=>x.fico);
  const avgLtv = avg(eligible,x=>x.ltv);
  const ocPct = APP.stackSliders.OC/100;
  const ocBal = poolBal * ocPct;

  // Moody's-style expected loss by scenario
  const scenarios = [
    {name:'Base',cdrMult:1.0,sevAdj:0,color:'var(--green)'},
    {name:'Moderate',cdrMult:2.0,sevAdj:0.03,color:'var(--accent)'},
    {name:'Severe',cdrMult:3.5,sevAdj:0.07,color:'var(--amber)'},
    {name:'GFC',cdrMult:6.0,sevAdj:0.15,color:'var(--red)'},
  ];
  const baseCDR = Math.max(0.5, (800-avgFico)/100 + (avgLtv-60)/30)*0.5;
  const baseSev = 0.30 + (avgLtv-65)/200;

  let html = `<div class="tbl-wrap"><table><thead><tr>
    <th style="text-align:left;">Scenario</th><th>CDR</th><th>Severity</th>
    <th>Cum Loss ($M)</th><th>Cum Loss %</th><th>OC Cushion</th><th>OC Surviving?</th>
  </tr></thead><tbody>`;
  scenarios.forEach(sc=>{
    const cdr = baseCDR*sc.cdrMult;
    const sev = Math.min(0.80, baseSev+sc.sevAdj);
    const cumLoss = poolBal * cdr/100 * sev * 5; // 5yr est
    const lossPct = cumLoss/poolBal*100;
    const ocSurvives = cumLoss < ocBal;
    html+=`<tr>
      <td style="text-align:left;color:${sc.color};">${sc.name}</td>
      <td>${cdr.toFixed(2)}%</td><td>${(sev*100).toFixed(1)}%</td>
      <td class="td-neg">$${(cumLoss/1e6).toFixed(1)}M</td>
      <td style="color:${lossPct>ocPct*100?'var(--red)':'var(--green)'};">${lossPct.toFixed(2)}%</td>
      <td>$${(ocBal/1e6).toFixed(1)}M (${(ocPct*100).toFixed(1)}%)</td>
      <td style="color:${ocSurvives?'var(--green)':'var(--red)'};">${ocSurvives?'✓ OC absorbs loss':'✗ Pierces into bonds'}</td>
    </tr>`;
  });
  html+='</tbody></table></div>';
  html+=`<div style="margin-top:10px;font-family:var(--mono);font-size:9px;color:var(--text3);">Calculated from your eligible pool: FICO ${avgFico.toFixed(0)}, LTV ${avgLtv.toFixed(1)}%, OC ${(ocPct*100).toFixed(1)}%</div>`;
  document.getElementById('ratingStressBody').innerHTML = html;
}

function calcWaterfallMonth1() {
  const eligible = applyEligibility(POOL_RAW, APP.eligCriteria).filter(x=>x.eligible);
  const poolBal = sum(eligible,x=>x.balance);
  const sl = APP.stackSliders;
  const wac = 6.75/100, fee=0.25/100, mr=wac/12;
  const cpr=0.08, cdr=0.02, sev=0.35;
  const smm=1-Math.pow(1-cpr,1/12), mdr=1-Math.pow(1-cdr,1/12);

  const grossInt = poolBal*mr;
  const svcFee = poolBal*fee/12;
  const netInt = grossInt-svcFee;
  const defaults = poolBal*mdr;
  const loss = defaults*sev;
  const recovery = defaults*(1-sev);
  const prepay = (poolBal-defaults)*smm;
  const pmt = poolBal*mr*Math.pow(1+mr,360)/(Math.pow(1+mr,360)-1);
  const schedPrin = Math.max(0,pmt-grossInt);
  const totalCF = netInt+schedPrin+prepay+recovery;

  const noteBal = poolBal*(1-sl.OC/100);
  const noteIntDue = Object.entries(sl).filter(([id])=>id!=='OC').reduce((a,[id,pct])=>a+poolBal*pct/100*TRANCHE_META[id].coupon/100/12,0);
  const ocRatio = poolBal/noteBal;
  const icRatio = netInt/noteIntDue;
  const ocPass = ocRatio >= 1.06;
  const icPass = icRatio >= 1.10;

  const fmt = v => '$'+(v/1e3).toFixed(1)+'K';
  const steps = [
    {n:1,label:'Gross Interest Collected',val:fmt(grossInt),color:'var(--text)',desc:'Pool WAC × Pool Balance / 12'},
    {n:2,label:'Servicer Fee Deducted',val:'-'+fmt(svcFee),color:'var(--red)',desc:'25bp annual fee for loan servicing'},
    {n:3,label:'Net Interest to Waterfall',val:fmt(netInt),color:'var(--amber)',desc:'Available for distribution'},
    {n:4,label:'Senior Interest — A1+A2',val:fmt(noteIntDue*(sl.A1+sl.A2)/(100-sl.OC)),color:'var(--green)',desc:'Paid first, always, regardless of triggers'},
    {n:5,label:`OC Test: ${(ocRatio*100).toFixed(2)}% vs 106% target`,val:ocPass?'✓ PASS':'✗ FAIL',color:ocPass?'var(--green)':'var(--red)',desc:`Pool Bal / Note Bal = ${(ocRatio*100).toFixed(2)}%`},
    {n:6,label:`IC Test: ${icRatio.toFixed(2)}x vs 1.10x target`,val:icPass?'✓ PASS':'✗ FAIL',color:icPass?'var(--green)':'var(--red)',desc:`Net Int / Note Int Due = ${icRatio.toFixed(2)}x`},
    {n:7,label:'Sub Interest (M1+M2+B1+B2)',val:ocPass&&icPass?fmt(noteIntDue*(sl.M1+sl.M2+sl.B1+sl.B2)/(100-sl.OC)):'TRAPPED',color:ocPass&&icPass?'var(--accent2)':'var(--red)',desc:ocPass&&icPass?'Released — triggers passing':'Redirected to build OC — triggers failing'},
    {n:8,label:'Principal — A1 Sequential',val:fmt(schedPrin+prepay+recovery),color:'var(--accent)',desc:'All principal to A1 until zeroed (sequential pay)'},
    {n:9,label:'Loss Allocated to OC',val:'-'+fmt(loss),color:'var(--red)',desc:`Defaults × Severity = loss absorbed by OC first`},
  ];

  document.getElementById('wfCalcBody').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:0;">
    ${steps.map((st,i)=>`
      <div style="display:flex;align-items:center;gap:0;animation:fadeUp 0.2s ${i*0.05}s ease forwards;opacity:0;">

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div>
          <div style="font-family:var(--mono);font-size:9px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px;">CUSIP Library</div>
          <div style="font-family:var(--sans);font-size:20px;font-weight:800;color:var(--text);">Public RMBS Bond Database</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px;">${CUSIP_DB.length} bonds tracked | Search by CUSIP, deal name, type, rating, issuer</div>
        </div>
        <button class="btn btn-primary" onclick="addCUSIPPrompt()">+ Add CUSIP</button>
      </div>

      <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;">
        <input class="search-mini" style="width:280px;" placeholder="Search CUSIP, deal, issuer, type..." 
          value="${APP.cusipSearch}" oninput="APP.cusipSearch=this.value;renderStage10()">
        <button class="filter-chip ${!APP.cusipSearch?'on':''}" onclick="APP.cusipSearch='';renderStage10()">All (${CUSIP_DB.length})</button>
        ${['Agency','Non-Agency Prime','Non-QM','CRT','SFR Rental'].map(t=>`
          <button class="filter-chip ${APP.cusipSearch===t?'on':''}" onclick="APP.cusipSearch='${t}';renderStage10()">${t}</button>
        `).join('')}
      </div>
    </div>

    <div style="padding:0 24px 80px;">
      ${APP.selectedCUSIP ? renderCUSIPDetail(APP.selectedCUSIP) : ''}

      <div style="font-family:var(--mono);font-size:9px;color:var(--text3);margin-bottom:10px;letter-spacing:1px;">
        SHOWING ${filtered.length} BONDS — Click any card to expand full analytics
      </div>

      <div class="tbl-wrap" style="max-height:none;">
        <table>
          <thead><tr>
            <th>CUSIP</th><th style="text-align:left;">Deal</th><th>Tranche</th><th>Type</th>
            <th>Rating</th><th>Coupon</th><th>Price</th><th>OAS</th>
            <th>WAL</th><th>CPR</th><th>CDR</th><th>Sev</th>
            <th>Avg FICO</th><th>Avg LTV</th><th>Top State</th><th>Actions</th>
          </tr></thead>
          <tbody>
          ${filtered.map(b=>`
            <tr onclick="selectCUSIP('${b.cusip}')" style="cursor:pointer;${APP.selectedCUSIP?.cusip===b.cusip?'background:rgba(123,97,255,0.08);':''}" >
              <td style="color:var(--accent);font-weight:700;">${b.cusip}</td>
              <td style="text-align:left;font-size:11px;">${b.deal}</td>
              <td><span style="background:rgba(123,97,255,0.15);padding:1px 6px;border-radius:2px;font-size:9px;color:var(--accent2);">${b.tranche}</span></td>
              <td style="font-size:9px;color:var(--text3);">${b.type}</td>
              <td><span style="font-size:9px;color:${b.rating.startsWith('AA')?'var(--green)':b.rating==='A'?'var(--accent)':b.rating.startsWith('BB')?'var(--red)':'var(--amber)'};">${b.rating}</span></td>
              <td>${b.coupon.toFixed(2)}%</td>
              <td class="td-accent">${b.price.toFixed(2)}</td>
              <td style="color:var(--amber);">${b.oas}bp</td>
              <td>${b.wal}yr</td>
              <td>${b.cpr}%</td>
              <td style="color:${b.cdr>2?'var(--red)':b.cdr>0.5?'var(--amber)':'var(--green)'};">${b.cdr}%</td>
              <td>${b.sev}%</td>
              <td style="color:${b.avg_fico>740?'var(--green)':b.avg_fico>680?'var(--amber)':b.avg_fico>0?'var(--red)':'var(--text3)'};">${b.avg_fico>0?b.avg_fico:'N/A'}</td>
              <td>${b.avg_ltv>0?b.avg_ltv+'%':'N/A'}</td>
              <td style="font-size:9px;color:var(--text3);">${b.state_top.split('/')[0]}</td>
              <td><button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();loadCUSIPIntoModel('${b.cusip}')">→ Model</button></td>
            </tr>
          `).join('')}
          </tbody>
        </table>
      </div>
    </div>
    ${bottomNav(10)}
  `);
}

function renderCUSIPDetail(b) {
  if(!b) return '';
  const impliedYld = (b.oas/100 + 4.39).toFixed(2);
  return `
    <div style="background:rgba(123,97,255,0.06);border:1px solid var(--accent2);border-radius:10px;padding:16px 20px;margin-bottom:20px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;">
        <div>
          <div style="font-family:var(--mono);font-size:9px;color:var(--accent);letter-spacing:2px;margin-bottom:3px;">${b.cusip}</div>
          <div style="font-family:var(--sans);font-size:18px;font-weight:800;color:var(--text);">${b.deal} — ${b.tranche}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px;">${b.type} | ${b.collateral} | Issuer: ${b.issuer}</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="APP.selectedCUSIP=null;renderStage10()">✕ Close</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:14px;">
        ${[['Rating',b.rating,''],['Price',b.price.toFixed(2),'% of par'],['Coupon',b.coupon.toFixed(2)+'%','fixed'],
           ['OAS',b.oas+'bp','vs UST'],['WAL',b.wal+'yr','weighted avg'],['Implied Yld',impliedYld+'%','Rf+OAS'],
           ['CPR',b.cpr+'%','prepay spd'],['CDR',b.cdr+'%','default rate'],['Severity',b.sev+'%','loss given def'],
           ['Avg FICO',b.avg_fico||'N/A','credit quality'],['Avg LTV',b.avg_ltv?b.avg_ltv+'%':'N/A','collateral'],
           ['Top State',b.state_top.split('/')[0],'concentration']
          ].map(([l,v,s])=>`<div style="background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:8px 10px;text-align:center;">
            <div style="font-family:var(--mono);font-size:8px;color:var(--text3);">${l}</div>
            <div style="font-family:var(--mono);font-size:14px;font-weight:700;color:var(--accent);margin-top:2px;">${v}</div>
            <div style="font-size:9px;color:var(--text3);">${s}</div>
          </div>`).join('')}
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn btn-primary btn-sm" onclick="loadCUSIPIntoModel('${b.cusip}')">→ Load into Cash Flow Model</button>
        <a href="https://efts.sec.gov/LATEST/search-index?q=%22${encodeURIComponent(b.deal)}%22&forms=10-D,ABS-EE" target="_blank" class="btn btn-ghost btn-sm">EDGAR Filings ↗</a>
        <a href="https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&type=ABS-EE" target="_blank" class="btn btn-ghost btn-sm">ABS-EE Data ↗</a>
      </div>
    </div>
  `;
}

function selectCUSIP(cusip) {
  APP.selectedCUSIP = CUSIP_DB.find(b=>b.cusip===cusip) || null;
  renderStage10();
}

function addCUSIPPrompt() {
  const cusip = prompt('Enter CUSIP (9 characters):','');
  if(!cusip || cusip.length < 6) return;
  const deal = prompt('Deal name (e.g. JPMMT 2024-4):','');
  const tranche = prompt('Tranche (e.g. A1):','A1');
  const type = prompt('Type (Agency/Non-Agency Prime/Non-QM/CRT):','Non-Agency Prime');
  const rating = prompt('Rating (AAA/AA/A/BBB/BB/B):','AAA');
  const coupon = parseFloat(prompt('Coupon %:','5.75'));
  const price = parseFloat(prompt('Price (% of par):','99.00'));

  if(CUSIP_DB.find(b=>b.cusip===cusip)) { alert('CUSIP already exists in database'); return; }

  CUSIP_DB.push({
    cusip, deal, tranche: tranche||'A1', type: type||'Non-Agency Prime',
    collateral:'User Added', rating: rating||'AAA', coupon: coupon||5.75,
    wal:5.0, price: price||99.00, oas:50, cpr:10, cdr:0.5, sev:30, bal:100,
    origDate:new Date().toISOString().slice(0,7), issuer:'User Added',
    servicer:'Unknown', state_top:'Unknown', avg_fico:0, avg_ltv:0, avg_dti:0, wac:coupon+0.5||6.25
  });
  alert(`✓ CUSIP ${cusip} added to database!`);
  renderStage10();
}

function loadCUSIPIntoModel(cusip) {
  const b = CUSIP_DB.find(x=>x.cusip===cusip);
  if(!b) return;
  // Store for main platform
  sessionStorage.setItem('structura_load_cusip', JSON.stringify(b));
  alert(`${b.deal} ${b.tranche} loaded!\n\nPool assumptions set:\nBalance: $${b.bal}M\nWAC: ${b.wac}%\nCPR: ${b.cpr}%\nCDR: ${b.cdr}%\nSeverity: ${b.sev}%\n\nSwitch to main platform → Cash Flow Engine to run model.`);
}

// ════════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════════
init();
</script>
</body>
</html>
